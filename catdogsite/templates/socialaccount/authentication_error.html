{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Failure — Pixeza</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="card" style="max-width: 460px;">
    <div class="brand">
      <div class="brand-icon">🐾</div>
      <div class="brand-name">Pixeza</div>
    </div>

    <h1 style="color: var(--accent-2);">Authentication Error</h1>
    <p class="subtitle">An error occurred while attempting to log in via your Google account.</p>

    <div class="upload-zone" style="border-color: rgba(255, 138, 92, 0.25); background: rgba(255, 138, 92, 0.05); color: var(--text-main); margin-bottom: 10px;">
      <p>Google returned an <strong>Access Denied</strong> response. This usually happens if the authorization screen was closed or if permissions were refused.</p>
    </div>

    <a href="{% url 'custom_login' %}" class="btn-primary" style="text-decoration: none; display: block; text-align: center; margin-top: 24px;">
      Back to Login
    </a>
  </div>
</body>
</html>
