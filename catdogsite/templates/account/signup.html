{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Log In — Pixeza</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🐾</div>
      <div class="brand-name">Pixeza</div>
    </div>

    <h1>Create your account</h1>
    <p class="subtitle">Start detecting cats and dogs in seconds.</p>

    <form method="POST" action="{% url 'account_signup' %}">
      {% csrf_token %}
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Password</label>
      <input type="password" name="password1" required>
      <label>Confirm Password</label>
      <input type="password" name="password2" required>
      <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <div class="divider">OR</div>

    <a href="{% url 'google_login' %}" class="btn-google">
      <span>🔵</span> Continue with Google
    </a>

    <p class="footer-note">Already have an account? <a href="{% url 'account_login' %}">Log in</a></p>
  </div>
</body>
</html>
