{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign Out — Pixeza</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🐾</div>
      <div class="brand-name">Pixeza</div>
    </div>
    <h1>Sign out?</h1>
    <p class="subtitle">You'll need to log back in to use the detector.</p>

    <form method="POST" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn-primary">Yes, sign me out</button>
    </form>
  </div>
</body>
</html>
